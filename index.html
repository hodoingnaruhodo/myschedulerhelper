<!-- mistake v4 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실수 노트</title>
<style>
  :root {
    --bg: #f7f7f5; --card: #ffffff; --ink: #1c1c1a; --muted: #6b6b66;
    --line: #e4e4df; --accent: #3b5bdb; --accent-soft: #e7ecfd; --danger: #d6453e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .page-link { font-size: 13px; color: var(--accent); text-decoration: none; }
  .page-link:hover { text-decoration: underline; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .new-cat { display: flex; gap: 8px; margin-bottom: 18px; }
  .new-cat input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; }
  .new-cat input:focus { outline: none; border-color: var(--accent); }
  .new-cat button { border: none; background: var(--accent); color: #fff; border-radius: 8px; padding: 0 16px; font-size: 14px; cursor: pointer; }

  .cat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .cat-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .cat-name { font-size: 16px; font-weight: 600; cursor: pointer; }
  .cat-name:hover { text-decoration: underline; }
  .cat-meta { font-size: 12px; color: var(--muted); margin-left: 8px; font-weight: 400; }
  .cat-del { border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 7px; padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .cat-del.armed { border-color: var(--danger); background: var(--danger); color: #fff; }

  .mlist { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .mlist li { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
  .modal .mlist li { background: var(--bg); }
  .m-top { display: flex; gap: 8px; align-items: center; }
  .m-top .mtxt { flex: 1; font-size: 14px; color: var(--ink); }
  .m-count { font-size: 12px; font-weight: 600; padding: 1px 9px; border-radius: 10px; flex-shrink: 0; white-space: nowrap; }
  .m-count.c1 { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
  .m-count.c2 { background: #fdf0d8; color: #b5790c; }
  .m-count.c3 { background: #fdeceb; color: var(--danger); }
  .modal .m-count.c1 { background: var(--card); }
  .m-top .mdel { color: #a55; cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .m-when { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .none { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .more-btn { width: 100%; border: 1px dashed var(--line); background: var(--card); color: var(--accent); border-radius: 8px; padding: 8px; font-size: 13px; cursor: pointer; margin-bottom: 12px; }
  .more-btn:hover { background: var(--accent-soft); }

  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
  .add-row input:focus { outline: none; border-color: var(--accent); }
  .add-row button { border: 1px solid var(--accent); background: var(--card); color: var(--accent); border-radius: 8px; padding: 0 14px; font-size: 14px; cursor: pointer; }

  .empty-all { text-align: center; color: var(--muted); padding: 50px 20px; }
  .note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 14px; width: 100%; max-width: 540px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close { border: none; background: none; font-size: 24px; color: var(--muted); cursor: pointer; line-height: 1; padding: 0 4px; }
  .sort-bar { display: flex; align-items: center; gap: 6px; padding: 12px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .sort-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
  .sort-btn { border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 7px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
  .sort-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .modal-body { overflow-y: auto; padding: 14px 18px; flex: 1; }
  .modal-add { display: flex; gap: 6px; padding: 12px 18px; border-top: 1px solid var(--line); flex-shrink: 0; }
  .modal-add input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
  .modal-add input:focus { outline: none; border-color: var(--accent); }
  .modal-add button { border: 1px solid var(--accent); background: var(--card); color: var(--accent); border-radius: 8px; padding: 0 14px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>실수 노트</h1>
    <a href="index.html" class="page-link">← 캘린더로</a>
  </header>
  <p class="sub" id="sub">업무 카테고리별로 과거 실수를 모아둡니다.</p>

  <div class="new-cat">
    <input type="text" id="newCat" placeholder="새 업무 카테고리 (예: 월말 정산)">
    <button id="newCatBtn">추가</button>
  </div>

  <div id="cats"></div>
  <p class="note" id="note"></p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
    </div>
    <div class="sort-bar">
      <span class="sort-label">정렬</span>
      <button class="sort-btn active" id="sortCount">횟수순</button>
      <button class="sort-btn" id="sortRecent">최근 발생순</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-add">
      <input type="text" id="modalInput" placeholder="이 업무에서 한 실수를 기록">
      <button id="modalAdd">추가</button>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const store = (() => {
    let mem = {}, ok = false;
    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); ok = true; } catch (e) {}
    return { ok,
      get(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
      set(k,v){ try { ok ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } } };
  })();

  let mistakes = {}, myEvents = [], jsonEvents = [];
  let modalCat = null, sortMode = "count";

  function migrateMistakes(obj){ const out={}; for(const k in obj){ out[k]=(obj[k]||[]).map(it=> typeof it==="string"?{text:it,count:1,last:null,first:null}:it); } return out; }
  function loadMistakes(){ try { mistakes = migrateMistakes(JSON.parse(store.get("mistakes")) || {}); } catch(e){ mistakes = {}; } }
  function saveMistakes(){ store.set("mistakes", JSON.stringify(mistakes)); }
  function loadMy(){ try { myEvents = JSON.parse(store.get("myEvents")) || []; } catch(e){ myEvents = []; } }
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function ago(ts){ if(!ts) return "기록 시점 없음"; const d=Math.floor((Date.now()-ts)/86400000); if(d<=0) return "오늘"; if(d===1) return "어제"; if(d<30) return d+"일 전"; const dt=new Date(ts); return (dt.getMonth()+1)+"월 "+dt.getDate()+"일"; }

  function categories(){
    const set = new Set(Object.keys(mistakes));
    myEvents.forEach(e=>{ if(e.taskType) set.add(e.taskType); });
    jsonEvents.forEach(e=>{ if(e.taskType) set.add(e.taskType); });
    return [...set].sort((a,b)=>a.localeCompare(b, "ko"));
  }
  function eventCount(cat){ return myEvents.filter(e=>e.taskType===cat).length + jsonEvents.filter(e=>e.taskType===cat).length; }
  function sortItems(list, mode){
    const a = list.slice();
    if (mode === "recent") a.sort((x,y)=>(y.last||0)-(x.last||0));
    else a.sort((x,y)=>(y.count||1)-(x.count||1));
    return a;
  }
  function recordMistake(cat, v){
    if (!mistakes[cat]) mistakes[cat] = [];
    const now = Date.now();
    const ex = mistakes[cat].find(m => m.text === v);
    if (ex){ ex.count = (ex.count||1)+1; ex.last = now; }
    else { mistakes[cat].push({ text: v, count: 1, last: now, first: now }); }
    saveMistakes();
  }
  function removeMistake(cat, item){
    const i = (mistakes[cat]||[]).indexOf(item);
    if (i>=0) mistakes[cat].splice(i,1);
    saveMistakes(); render();
    if (modalCat === cat) renderModal();
  }

  function makeItem(cat, item){
    const cnt = item.count||1;
    const li = document.createElement("li");
    const top = document.createElement("div"); top.className="m-top";
    const span = document.createElement("span"); span.className="mtxt"; span.textContent=item.text;
    const badge = document.createElement("span"); badge.className="m-count "+(cnt>=3?"c3":cnt===2?"c2":"c1"); badge.textContent=cnt+"회";
    const del = document.createElement("span"); del.className="mdel"; del.textContent="삭제";
    del.onclick = ()=>removeMistake(cat, item);
    top.appendChild(span); top.appendChild(badge); top.appendChild(del);
    li.appendChild(top);
    if (item.last){ const w=document.createElement("div"); w.className="m-when"; w.textContent="마지막 발생일자 : "+ago(item.last); li.appendChild(w); }
    return li;
  }

  function render(){
    const cats = categories();
    const wrap = $("cats"); wrap.innerHTML = "";
    const totalItems = Object.values(mistakes).reduce((s,a)=>s+a.length, 0);
    const totalOccur = Object.values(mistakes).reduce((s,a)=>s+a.reduce((x,m)=>x+(m.count||1),0), 0);
    $("sub").textContent = "카테고리 " + cats.length + "개 · 실수 유형 " + totalItems + "개 · 총 " + totalOccur + "회 발생";

    if (!cats.length){
      wrap.innerHTML = '<div class="empty-all">아직 카테고리가 없습니다.<br>위에서 새 카테고리를 추가하거나, 캘린더에서 일정에 업무 카테고리를 달면 여기 모입니다.</div>';
      $("note").textContent = store.ok ? "" : "저장 불가 환경 (실제 사이트에서 캘린더와 데이터가 공유됩니다)";
      return;
    }

    cats.forEach(cat => {
      const list = mistakes[cat] || [];
      const totalCount = list.reduce((s,m)=> s+(m.count||1), 0);
      const card = document.createElement("div"); card.className = "cat";

      const head = document.createElement("div"); head.className = "cat-head";
      const nameWrap = document.createElement("div");
      nameWrap.innerHTML = '<span class="cat-name">' + esc(cat) + '</span><span class="cat-meta">총 ' + totalCount + '회 · 항목 ' + list.length + '개 · 일정 ' + eventCount(cat) + '건</span>';
      nameWrap.querySelector(".cat-name").onclick = ()=>openModal(cat);
      head.appendChild(nameWrap);

      const delBtn = document.createElement("button"); delBtn.className = "cat-del"; delBtn.textContent = "카테고리 삭제";
      let armed = false;
      delBtn.onclick = () => {
        if (!armed){ armed = true; delBtn.textContent = "한번 더 누르면 삭제"; delBtn.classList.add("armed"); }
        else { delete mistakes[cat]; saveMistakes(); render(); }
      };
      head.appendChild(delBtn);
      card.appendChild(head);

      if (list.length){
        const sorted = sortItems(list, "count");
        const ul = document.createElement("ul"); ul.className = "mlist";
        sorted.slice(0,3).forEach(item => ul.appendChild(makeItem(cat, item)));
        card.appendChild(ul);
        if (list.length > 3){
          const more = document.createElement("button"); more.className = "more-btn";
          more.textContent = "+" + (list.length-3) + "개 더 보기 (정렬·전체 보기)";
          more.onclick = ()=>openModal(cat);
          card.appendChild(more);
        }
      } else {
        const none = document.createElement("div"); none.className = "none"; none.textContent = "아직 기록된 실수가 없습니다.";
        card.appendChild(none);
      }

      const row = document.createElement("div"); row.className = "add-row";
      const inp = document.createElement("input"); inp.type = "text"; inp.placeholder = "이 업무에서 한 실수를 기록 (같은 실수는 자동으로 횟수 누적)";
      const btn = document.createElement("button"); btn.textContent = "추가";
      const addFn = () => { const v = inp.value.trim(); if (!v) return; recordMistake(cat, v); inp.value=""; render(); if(modalCat===cat) renderModal(); };
      btn.onclick = addFn;
      inp.addEventListener("keydown", (e)=>{ if(e.key==="Enter") addFn(); });
      row.appendChild(inp); row.appendChild(btn);
      card.appendChild(row);

      wrap.appendChild(card);
    });
    $("note").textContent = store.ok ? "" : "저장 불가 환경 (실제 사이트에서 캘린더와 데이터가 공유됩니다)";
  }

  function openModal(cat){ modalCat = cat; sortMode = "count"; updateSortBtns(); renderModal(); $("overlay").classList.add("open"); }
  function closeModal(){ $("overlay").classList.remove("open"); modalCat = null; }
  function updateSortBtns(){ $("sortCount").classList.toggle("active", sortMode==="count"); $("sortRecent").classList.toggle("active", sortMode==="recent"); }
  function renderModal(){
    if (!modalCat) return;
    const list = mistakes[modalCat] || [];
    const totalCount = list.reduce((s,m)=> s+(m.count||1), 0);
    $("modalTitle").textContent = modalCat;
    $("modalSub").textContent = "총 " + totalCount + "회 · 항목 " + list.length + "개";
    const body = $("modalBody"); body.innerHTML = "";
    if (!list.length){ body.innerHTML = '<div class="none">기록된 실수가 없습니다.</div>'; return; }
    const ul = document.createElement("ul"); ul.className = "mlist";
    sortItems(list, sortMode).forEach(item => ul.appendChild(makeItem(modalCat, item)));
    body.appendChild(ul);
  }

  $("newCatBtn").addEventListener("click", () => {
    const name = $("newCat").value.trim(); if (!name) return;
    if (!mistakes[name]) mistakes[name] = [];
    $("newCat").value = ""; saveMistakes(); render();
  });
  $("newCat").addEventListener("keydown", (e)=>{ if(e.key==="Enter") $("newCatBtn").click(); });
  $("modalClose").addEventListener("click", closeModal);
  $("overlay").addEventListener("click", (e)=>{ if(e.target===$("overlay")) closeModal(); });
  document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });
  $("sortCount").addEventListener("click", ()=>{ sortMode="count"; updateSortBtns(); renderModal(); });
  $("sortRecent").addEventListener("click", ()=>{ sortMode="recent"; updateSortBtns(); renderModal(); });
  $("modalAdd").addEventListener("click", ()=>{ const v=$("modalInput").value.trim(); if(!v||!modalCat) return; recordMistake(modalCat, v); $("modalInput").value=""; render(); renderModal(); });
  $("modalInput").addEventListener("keydown", (e)=>{ if(e.key==="Enter") $("modalAdd").click(); });

  async function init(){
    loadMistakes(); loadMy();
    try {
      const res = await fetch("schedule.json", { cache: "no-store" });
      if (res.ok){ const data = await res.json(); jsonEvents = data.events || []; }
    } catch(e){ jsonEvents = []; }
    render();
  }
  init();
</script>
</body>
</html>
